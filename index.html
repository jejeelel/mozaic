<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REAL TikTok Style Shader</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
</style>
</head>
<body>

<canvas id="glcanvas"></canvas>

<script>
const canvas = document.getElementById("glcanvas");
const gl = canvas.getContext("webgl");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// VERTEX
const vs = `
attribute vec2 position;
varying vec2 vUV;
void main(){
  vUV = position * 0.5 + 0.5;
  gl_Position = vec4(position,0.0,1.0);
}`;

// FRAGMENT (TEXT MOSAIC REAL)
const fs = `
precision mediump float;

uniform sampler2D uImage;
uniform float zoom;

varying vec2 vUV;

float rand(vec2 co){
  return fract(sin(dot(co.xy,vec2(12.9898,78.233)))*43758.5453);
}

void main(){
  vec2 uv = vUV;

  // zoom ke tengah
  vec2 center = vec2(0.5);
  uv = (uv - center)/zoom + center;

  vec4 col = texture2D(uImage, uv);

  float brightness = (col.r + col.g + col.b)/3.0;

  // grid
  float gridSize = 0.02;
  vec2 gridUV = floor(uv / gridSize) * gridSize;

  // sample ulang biar stabil
  vec4 gcol = texture2D(uImage, gridUV);
  float b = (gcol.r + gcol.g + gcol.b)/3.0;

  // text mask (ini bikin efek tulisan)
  float pattern = step(0.5, rand(gridUV*100.0));

  // density (gelap = banyak teks)
  float density = smoothstep(0.2, 0.8, 1.0 - b);

  vec3 finalColor = mix(vec3(0.0), gcol.rgb, pattern * density);

  gl_FragColor = vec4(finalColor,1.0);
}
`;

// compile
function compile(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  return s;
}

const program = gl.createProgram();
gl.attachShader(program, compile(gl.VERTEX_SHADER, vs));
gl.attachShader(program, compile(gl.FRAGMENT_SHADER, fs));
gl.linkProgram(program);
gl.useProgram(program);

// quad
const buffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
 -1,-1, 1,-1, -1,1, 1,1
]), gl.STATIC_DRAW);

const pos = gl.getAttribLocation(program,"position");
gl.enableVertexAttribArray(pos);
gl.vertexAttribPointer(pos,2,gl.FLOAT,false,0,0);

// texture
const img = new Image();
img.src = "fairen5.jpeg";

img.onload = ()=>{
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,img);

  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);

  render();
};

let zoom = 1;

window.addEventListener("wheel", e=>{
  zoom += e.deltaY * -0.001;
  zoom = Math.max(1, Math.min(zoom, 5));
});

function render(){
  const zoomLoc = gl.getUniformLocation(program,"zoom");
  gl.uniform1f(zoomLoc, zoom);

  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  requestAnimationFrame(render);
}
</script>

</body>
</html>
