<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text Portrait</title>
<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

#output {
  line-height: 0.6;
  font-family: monospace;
  white-space: pre;
  text-align: center;
  color: white;
  transform: scale(1);
  transition: transform 0.3s;
}
</style>
</head>
<body>

<div id="output"></div>

<script>
const img = new Image();
img.src = "fairen5.jpeg"; // ganti sesuai nama file

const output = document.getElementById("output");

img.onload = () => {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  const width = 120; // semakin kecil = semakin detail
  const ratio = img.height / img.width;

  canvas.width = width;
  canvas.height = width * ratio;

  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

  const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

  let text = "";
  const chars = "I LOVE YOU ";

  for (let y = 0; y < canvas.height; y++) {
    for (let x = 0; x < canvas.width; x++) {

      const i = (y * canvas.width + x) * 4;

      const r = data[i];
      const g = data[i+1];
      const b = data[i+2];

      const brightness = (r + g + b) / 3;

      // mapping brightness ke karakter
      const charIndex = Math.floor((brightness / 255) * (chars.length - 1));
      text += chars[charIndex];
    }
    text += "\n";
  }

  output.textContent = text;
};

// zoom manual pakai scroll
window.addEventListener("wheel", (e) => {
  let scale = parseFloat(output.style.transform.replace("scale(", "")) || 1;
  scale += e.deltaY * -0.001;
  scale = Math.max(0.5, Math.min(scale, 3));
  output.style.transform = `scale(${scale})`;
});
</script>

</body>
</html>
