<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>I LOVE YOU Mosaic</title>
<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}
canvas {
  display: block;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const img = new Image();
img.src = "./fairen5.jpeg"; // pastikan nama file sesuai

let zoom = 1;

// zoom manual pakai scroll
window.addEventListener("wheel", e => {
  zoom += e.deltaY * -0.001;
  zoom = Math.max(1, Math.min(zoom, 5));
  draw();
});

img.onload = () => {
  draw();
};

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const w = img.width * zoom;
  const h = img.height * zoom;

  const x = canvas.width / 2 - w / 2;
  const y = canvas.height / 2 - h / 2;

  // tampil normal kalau belum zoom
  if (zoom < 2) {
    ctx.drawImage(img, x, y, w, h);
    return;
  }

  // 🔥 SCALE DOWN BIAR KEBENTUK
  const scale = 0.06;
  const smallW = Math.floor(canvas.width * scale);
  const smallH = Math.floor(canvas.height * scale);

  const temp = document.createElement("canvas");
  const tctx = temp.getContext("2d");

  temp.width = smallW;
  temp.height = smallH;

  // gambar versi kecil
  tctx.drawImage(img, x, y, w, h, 0, 0, smallW, smallH);

  const data = tctx.getImageData(0, 0, smallW, smallH).data;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 🔥 RENDER TEKS
  for (let py = 0; py < smallH; py++) {
    for (let px = 0; px < smallW; px++) {

      const i = (py * smallW + px) * 4;

      const r = data[i];
      const g = data[i + 1];
      const b = data[i + 2];

      ctx.fillStyle = `rgb(${r},${g},${b})`;

      // ukuran font otomatis sesuai scale
      ctx.font = `${1/scale}px monospace`;

      ctx.fillText("I LOVE YOU", px / scale, py / scale);
    }
  }
}
</script>

</body>
</html>
