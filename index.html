<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TikTok Text Mosaic</title>
<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// canvas tambahan buat ambil pixel (INI KUNCI FIX)
const tempCanvas = document.createElement("canvas");
const tempCtx = tempCanvas.getContext("2d");

tempCanvas.width = canvas.width;
tempCanvas.height = canvas.height;

const img = new Image();
img.src = "./fairen5.jpeg"; // SESUAIKAN NAMA FILE

let zoom = 1;

img.onload = () => {
  requestAnimationFrame(animate);
};

img.onerror = () => {
  alert("Gambar gagal load! Cek nama file & ekstensi!");
};

// 🔥 MOSAIC BENERAN (bukan overlay)
function drawMosaic(x, y, w, h) {
  // gambar ke canvas sementara
  tempCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
  tempCtx.drawImage(img, x, y, w, h);

  const imageData = tempCtx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const step = 6; // makin kecil makin detail

  for (let py = 0; py < canvas.height; py += step) {
    for (let px = 0; px < canvas.width; px += step) {

      const i = (py * canvas.width + px) * 4;

      const r = data[i];
      const g = data[i + 1];
      const b = data[i + 2];

      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.font = "6px monospace";

      ctx.fillText("I LOVE YOU", px, py);
    }
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const w = img.width * zoom;
  const h = img.height * zoom;

  const x = canvas.width / 2 - w / 2;
  const y = canvas.height / 2 - h / 2;

  // tampilkan gambar dulu
  ctx.drawImage(img, x, y, w, h);

  // ubah jadi mosaic saat zoom
  if (zoom > 1.5) {
    drawMosaic(x, y, w, h);
  }

  zoom += 0.02;

  if (zoom < 4) {
    requestAnimationFrame(animate);
  }
}
</script>

</body>
</html>
