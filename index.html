<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Text Atlas Mosaic (Closest to TikTok)</title>
<style>
body{margin:0;overflow:hidden;background:black;}
canvas{display:block;}
</style>
</head>
<body>

<canvas id="gl"></canvas>

<script>
const canvas = document.getElementById("gl");
const gl = canvas.getContext("webgl");
canvas.width = innerWidth;
canvas.height = innerHeight;

// ---------- TEXT ATLAS (canvas -> texture) ----------
function createTextAtlas() {
  const c = document.createElement("canvas");
  const ctx = c.getContext("2d");

  const cols = 16; // grid atlas
  const size = 64; // per cell
  c.width = cols * size;
  c.height = size;

  ctx.fillStyle = "black";
  ctx.fillRect(0,0,c.width,c.height);

  ctx.fillStyle = "white";
  ctx.font = "48px monospace";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  const chars = "I LOVE YOU ";
  for (let i=0;i<cols;i++){
    const ch = chars[i % chars.length];
    ctx.fillText(ch, i*size + size/2, size/2);
  }

  return {canvas:c, cols, size};
}

const atlas = createTextAtlas();

// ---------- SHADERS ----------
const vs = `
attribute vec2 position;
varying vec2 vUV;
void main(){
  vUV = position*0.5+0.5;
  gl_Position = vec4(position,0.0,1.0);
}`;

const fs = `
precision mediump float;

uniform sampler2D uImage;
uniform sampler2D uAtlas;
uniform float zoom;
uniform float cols;

varying vec2 vUV;

void main(){
  vec2 uv = vUV;

  // zoom ke tengah
  vec2 c = vec2(0.5);
  uv = (uv - c)/zoom + c;

  // sample image
  vec3 col = texture2D(uImage, uv).rgb;
  float b = (col.r+col.g+col.b)/3.0;

  // grid mosaic
  float grid = 0.015;
  vec2 cell = floor(uv/grid)*grid;

  // sample ulang biar stabil
  vec3 c2 = texture2D(uImage, cell).rgb;
  float b2 = (c2.r+c2.g+c2.b)/3.0;

  // pilih karakter dari brightness
  float idx = floor(b2 * (cols-1.0));
  float u = (idx + fract(uv.x/grid)) / cols;
  float v = fract(uv.y/grid);

  vec2 atlasUV = vec2(u, v);

  float letter = texture2D(uAtlas, atlasUV).r;

  vec3 finalColor = c2 * letter;

  gl_FragColor = vec4(finalColor,1.0);
}`;

// ---------- COMPILE ----------
function compile(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s,src);
  gl.compileShader(s);
  return s;
}

const program = gl.createProgram();
gl.attachShader(program, compile(gl.VERTEX_SHADER, vs));
gl.attachShader(program, compile(gl.FRAGMENT_SHADER, fs));
gl.linkProgram(program);
gl.useProgram(program);

// quad
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
-1,-1, 1,-1, -1,1, 1,1
]), gl.STATIC_DRAW);

const pos = gl.getAttribLocation(program,"position");
gl.enableVertexAttribArray(pos);
gl.vertexAttribPointer(pos,2,gl.FLOAT,false,0,0);

// ---------- TEXTURE IMAGE ----------
const img = new Image();
img.src = "fairen5.jpeg";

img.onload = ()=>{
  // image texture
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,img);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);

  // atlas texture
  const atlasTex = gl.createTexture();
  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D, atlasTex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,atlas.canvas);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);

  gl.uniform1i(gl.getUniformLocation(program,"uImage"),0);
  gl.uniform1i(gl.getUniformLocation(program,"uAtlas"),1);
  gl.uniform1f(gl.getUniformLocation(program,"cols"), atlas.cols);

  render();
};

let zoom = 1;
window.addEventListener("wheel", e=>{
  zoom += e.deltaY * -0.001;
  zoom = Math.max(1, Math.min(zoom,5));
});

function render(){
  gl.uniform1f(gl.getUniformLocation(program,"zoom"), zoom);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  requestAnimationFrame(render);
}
</script>

</body>
</html>
