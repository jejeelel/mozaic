<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FIXED TEXT PORTRAIT</title>
<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#output {
  font-family: monospace;
  line-height: 0.6;
  white-space: pre;
  color: white;
}
</style>
</head>
<body>

<div id="output"></div>

<script>
const img = new Image();
img.src = "fairen5.jpeg";

const output = document.getElementById("output");

img.onload = () => {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  const width = 120;
  const ratio = img.height / img.width;

  canvas.width = width;
  canvas.height = width * ratio;

  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

  const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

  let text = "";
  const density = " .:-=+*#%@"; // ini kunci
  const phrase = "I LOVE YOU";

  let counter = 0;

  for (let y = 0; y < canvas.height; y++) {
    for (let x = 0; x < canvas.width; x++) {

      const i = (y * canvas.width + x) * 4;

      const r = data[i];
      const g = data[i+1];
      const b = data[i+2];

      const brightness = (r + g + b) / 3;

      // mapping brightness ke density
      const index = Math.floor((brightness / 255) * (density.length - 1));

      // 🔥 mix density + "I LOVE YOU"
      let char = density[index];

      if (index < 5) {
        char = phrase[counter % phrase.length];
        counter++;
      }

      text += char;
    }
    text += "\n";
  }

  output.textContent = text;
};
</script>

</body>
</html>
